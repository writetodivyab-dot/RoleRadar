name: RoleRadar Job Search

on:
  schedule:
    - cron: '0 8,12,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic playwright pyyaml python-dotenv openai requests
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: echo "OPENAI_API_KEY=$OPENAI_API_KEY" > .env

      - name: Run search and email digest
        run: |
          python run.py --search
          python run.py --email

      - name: Commit updated database
        run: |
          git config --global user.name "RoleRadar Bot"
          git config --global user.email "bot@roleradar.com"
          git add data/jobs.db data/email_digest.json
          git diff --staged --quiet || git commit -m "Update jobs database and digest"
          git push