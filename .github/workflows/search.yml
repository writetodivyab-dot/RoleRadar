name: RoleRadar Job Search

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:         # Allow manual trigger

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic playwright pyyaml python-dotenv openai requests
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: echo "OPENAI_API_KEY=$OPENAI_API_KEY" > .env

      - name: Run search
        run: python run.py --search

      - name: Commit updated database
        run: |
          git config --global user.name "RoleRadar Bot"
          git config --global user.email "bot@roleradar.com"
          git add data/jobs.db
          git diff --staged --quiet || git commit -m "Update jobs database"
          git push